[package]
name = "rust_demo"
version = "0.1.0"
edition = "2024"

[dependencies]
cty = "0.2.2"
rust_esprit = { path = "../../esprit/rust/rust_esprit", features = ["fake_std"] }
ufmt = "*"

[lib]
name = "rust_demo"
path = "src/lib.rs"
crate-type = ["staticlib"] # Creates static lib

[profile.dev]
debug = true
lto = false
opt-level       = 0

[profile.release]
debug = true
lto = true
opt-level       = 0
